version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finhealth-db
    environment:
      POSTGRES_DB: finhealth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: .
    container_name: finhealth-server
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://postgres:password@db:5432/finhealth?sslmode=disable"
      JWT_SECRET: "your-production-secret-key-change-this"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: