type Account {
  id: ID!
  name: String!
  type: AccountType!
  balance: Float!
  icon: String!
  userId: ID!
  user: User!
  transactions: [Transaction!]!
  createdAt: String!
  updatedAt: String!
}

enum AccountType {
  CHECKING
  SAVINGS
  CREDIT_CARD
  INVESTMENT
  LOAN
}

type AuthPayload {
  token: String!
  user: User!
}

type Category {
  id: ID!
  name: String!
  icon: String!
  color: String!
  userId: ID!
  user: User!
  subcategories: [Subcategory!]!
  transactions: [Transaction!]!
}

input CreateAccountInput {
  name: String!
  type: AccountType!
  icon: String!
}

input CreateCategoryInput {
  name: String!
  icon: String!
  color: String!
}

input CreateSubcategoryInput {
  name: String!
  categoryId: ID!
}

input CreateTransactionInput {
  name: String!
  amount: Float!
  date: String!
  notes: String
  icon: String!
  color: String!
  accountId: ID!
  categoryId: ID!
  subcategoryId: ID
}

input LoginInput {
  email: String!
  password: String!
}

type Mutation {
  register(input: RegisterInput!): AuthPayload!
  login(input: LoginInput!): AuthPayload!
  createAccount(input: CreateAccountInput!): Account!
  updateAccount(id: ID!, input: UpdateAccountInput!): Account!
  deleteAccount(id: ID!): Boolean!
  createTransaction(input: CreateTransactionInput!): Transaction!
  updateTransaction(id: ID!, input: UpdateTransactionInput!): Transaction!
  deleteTransaction(id: ID!): Boolean!
  createCategory(input: CreateCategoryInput!): Category!
  updateCategory(id: ID!, input: UpdateCategoryInput!): Category!
  deleteCategory(id: ID!): Boolean!
  createSubcategory(input: CreateSubcategoryInput!): Subcategory!
  updateSubcategory(id: ID!, input: UpdateSubcategoryInput!): Subcategory!
  deleteSubcategory(id: ID!): Boolean!
}

type Query {
  me: User!
  accounts: [Account!]!
  account(id: ID!): Account
  transactions(
    filter: TransactionFilter
    limit: Int
    offset: Int
  ): [Transaction!]!
  transaction(id: ID!): Transaction
  categories: [Category!]!
  category(id: ID!): Category
  netWorth: Float!
  monthlySpending(year: Int!, month: Int!): Float!
  savingsRate(year: Int!, month: Int!): Float!
  debtToIncomeRatio: Float!
}

input RegisterInput {
  email: String!
  password: String!
  name: String!
}

type Subcategory {
  id: ID!
  name: String!
  categoryId: ID!
  category: Category!
  transactions: [Transaction!]!
}

type Transaction {
  id: ID!
  name: String!
  amount: Float!
  date: String!
  notes: String
  hasNote: Boolean!
  icon: String!
  color: String!
  userId: ID!
  user: User!
  accountId: ID!
  account: Account!
  categoryId: ID!
  category: Category!
  subcategoryId: ID
  subcategory: Subcategory
  createdAt: String!
  updatedAt: String!
}

input TransactionFilter {
  accountId: ID
  categoryId: ID
  subcategoryId: ID
  dateFrom: String
  dateTo: String
  amountMin: Float
  amountMax: Float
  search: String
}

input UpdateAccountInput {
  name: String
  balance: Float
  icon: String
}

input UpdateCategoryInput {
  name: String
  icon: String
  color: String
}

input UpdateSubcategoryInput {
  name: String
  categoryId: ID
}

input UpdateTransactionInput {
  name: String
  amount: Float
  date: String
  notes: String
  icon: String
  color: String
  accountId: ID
  categoryId: ID
  subcategoryId: ID
}

type User {
  id: ID!
  email: String!
  name: String!
  createdAt: String!
  updatedAt: String!
  accounts: [Account!]!
  transactions: [Transaction!]!
  categories: [Category!]!
}
